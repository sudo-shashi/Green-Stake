name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm install --no-package-lock

      - name: Type check frontend
        run: npm run typecheck

  contract:
    name: Contract build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Build contract
        run: cargo build --manifest-path contract/Cargo.toml --target wasm32v1-none --release
